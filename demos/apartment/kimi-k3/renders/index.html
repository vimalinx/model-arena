<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Renders — Kimi K3</title>
<style>body{margin:0;background:#0d1117;color:#c9d1d9;font-family:system-ui;padding:24px}h1{font-size:20px}a{color:#58a6ff}.g{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-top:20px}figure{margin:0;background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}img{width:100%}figcaption{padding:8px 12px;font-size:12px;color:#8b949e}</style>
