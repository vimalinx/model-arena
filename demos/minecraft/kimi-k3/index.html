<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft 2 - 体素世界</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; image-rendering: pixelated; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  #crosshair {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 24px; height: 24px; color: rgba(255,255,255,0.9); font-size: 24px; line-height: 24px;
    text-align: center; text-shadow: 1px 1px 0 #000; pointer-events: none; user-select: none;
  }
  #hotbar {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; padding: 8px; background: rgba(0,0,0,0.35); border-radius: 10px;
    pointer-events: auto;
  }
  .slot {
    width: 52px; height: 52px; background: rgba(0,0,0,0.45); border: 3px solid rgba(255,255,255,0.25);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    position: relative; cursor: pointer; transition: border-color 0.1s, transform 0.1s;
  }
  .slot.active { border-color: #fff; transform: scale(1.08); background: rgba(0,0,0,0.6); }
  .slot canvas { width: 40px; height: 40px; image-rendering: pixelated; }
  .slot .key {
    position: absolute; top: 2px; left: 4px; color: #ddd; font-size: 11px; font-weight: bold;
    text-shadow: 1px 1px 0 #000;
  }
  #info {
    position: absolute; top: 12px; left: 12px; color: #fff; font-size: 14px;
    font-family: 'Courier New', Courier, monospace; text-shadow: 1px 1px 0 #000; line-height: 1.5;
  }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, rgba(20,30,40,0.92), rgba(10,15,20,0.95));
    display: flex; align-items: center; justify-content: center; pointer-events: auto; z-index: 10;
  }
  #menu {
    background: rgba(0,0,0,0.6); border: 4px solid #555; border-radius: 12px; padding: 36px 48px;
    text-align: center; color: #fff; max-width: 560px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  #menu h1 { font-size: 42px; margin-bottom: 8px; text-shadow: 3px 3px 0 #3a6b28; letter-spacing: 2px; }
  #menu p { margin: 8px 0; font-size: 16px; color: #ddd; }
  #menu .controls { margin: 20px 0; text-align: left; display: inline-block; }
  #menu .controls li { margin: 6px 0; list-style: none; }
  #menu .controls kbd {
    background: #333; border: 1px solid #777; border-radius: 4px; padding: 2px 8px;
    font-family: monospace; color: #fff; display: inline-block; min-width: 60px; text-align: center;
  }
  #startBtn {
    margin-top: 18px; padding: 12px 36px; font-size: 20px; font-weight: bold; color: #fff;
    background: linear-gradient(to bottom, #5a9e3d, #3a6b28); border: 3px solid #2d4f1f;
    border-radius: 8px; cursor: pointer; box-shadow: 0 6px 0 #2d4f1f; transition: transform 0.05s;
  }
  #startBtn:active { transform: translateY(4px); box-shadow: 0 2px 0 #2d4f1f; }
  #blockName {
    position: absolute; bottom: 96px; left: 50%; transform: translateX(-50%);
    color: #fff; font-size: 18px; text-shadow: 1px 1px 0 #000; background: rgba(0,0,0,0.35);
    padding: 4px 14px; border-radius: 6px; pointer-events: none; opacity: 0.9;
  }
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #fff; font-size: 20px; text-shadow: 1px 1px 0 #000; display: none;
  }
</style>
</head>
<body>
<div id="ui">
  <div id="crosshair">+</div>
  <div id="hotbar"></div>
  <div id="blockName">草方块</div>
  <div id="info">XYZ: 0 / 0 / 0<br>FPS: 0</div>
  <div id="loading">正在生成世界...</div>
</div>
<div id="overlay">
  <div id="menu">
    <h1>MINECRAFT 2</h1>
    <p>基于 Three.js 的单文件体素世界</p>
    <ul class="controls">
      <li><kbd>W A S D</kbd> 移动</li>
      <li><kbd>空格</kbd> 跳跃（可连跳）</li>
      <li><kbd>鼠标</kbd> 移动视角</li>
      <li><kbd>左键</kbd> 破坏方块 &nbsp; <kbd>右键</kbd> 放置方块</li>
      <li><kbd>1-9</kbd> 选择方块类型 &nbsp; <kbd>ESC</kbd> 释放鼠标</li>
    </ul>
    <br>
    <button id="startBtn">开始游戏</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
//  Minecraft 2 - 单文件体素世界
// ============================================================

const CHUNK_SIZE = 16;
const CHUNK_HEIGHT = 96;
const RENDER_DISTANCE = 5;
const BLOCK_SIZE = 1;
const GRAVITY = -28;
const JUMP_SPEED = 9.5;
const WALK_SPEED = 5.5;
const RUN_SPEED = 8.5;
const PLAYER_HEIGHT = 1.65;
const PLAYER_WIDTH = 0.6;
const REACH = 5.5;

const BLOCKS = {
  air:        { id: 0, solid: false },
  grass:      { id: 1, solid: true,  name: '草方块',      color: '#5a9e3d', textures: { top: 'grass_top', side: 'grass_side', bottom: 'dirt' } },
  dirt:       { id: 2, solid: true,  name: '泥土',        color: '#7a5a3a', textures: { all: 'dirt' } },
  stone:      { id: 3, solid: true,  name: '石头',        color: '#888888', textures: { all: 'stone' } },
  wood:       { id: 4, solid: true,  name: '原木',        color: '#6b4f2f', textures: { top: 'wood_top', side: 'wood_side', bottom: 'wood_top' } },
  leaves:     { id: 5, solid: true,  name: '树叶',        color: '#3a7a2a', transparent: true, textures: { all: 'leaves' } },
  sand:       { id: 6, solid: true,  name: '沙子',        color: '#d6cf98', textures: { all: 'sand' } },
  cobblestone:{ id: 7, solid: true,  name: '圆石',        color: '#777777', textures: { all: 'cobblestone' } },
  planks:     { id: 8, solid: true,  name: '木板',        color: '#b8935f', textures: { all: 'planks' } },
  glass:      { id: 9, solid: true,  name: '玻璃',        color: '#aaddff', transparent: true, textures: { all: 'glass' } },
  bedrock:    { id: 10, solid: true, name: '基岩',        color: '#333333', textures: { all: 'bedrock' } }
};

const BLOCK_BY_ID = {};
const BLOCK_LIST = [];
for (const key in BLOCKS) {
  BLOCKS[key].key = key;
  BLOCK_BY_ID[BLOCKS[key].id] = BLOCKS[key];
  if (BLOCKS[key].id !== 0) BLOCK_LIST.push(BLOCKS[key]);
}

const HOTBAR = [
  BLOCKS.grass, BLOCKS.dirt, BLOCKS.stone, BLOCKS.wood, BLOCKS.leaves,
  BLOCKS.sand, BLOCKS.cobblestone, BLOCKS.planks, BLOCKS.glass
];
let selectedSlot = 0;

// 纹理生成
const TEX_SIZE = 64;
const TEX_NAMES = [
  'grass_top','grass_side','dirt','stone','wood_top','wood_side','leaves',
  'sand','cobblestone','planks','glass','bedrock'
];

function hash(x, z) {
  let s = Math.sin(x * 127.1 + z * 311.7) * 43758.5453;
  return s - Math.floor(s);
}
function noise(x, z) {
  const X = Math.floor(x), Z = Math.floor(z);
  const xf = x - X, zf = z - Z;
  const u = xf * xf * xf * (xf * (xf * 6 - 15) + 10);
  const v = zf * zf * zf * (zf * (zf * 6 - 15) + 10);
  const a = hash(X, Z), b = hash(X + 1, Z), c = hash(X, Z + 1), d = hash(X + 1, Z + 1);
  return a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
}
function fbm(x, z, octaves) {
  let v = 0, a = 1, f = 1;
  for (let i = 0; i < octaves; i++) {
    v += noise(x * f, z * f) * a;
    a *= 0.5; f *= 2;
  }
  return v;
}

function createTexture(name) {
  const c = document.createElement('canvas');
  c.width = c.height = TEX_SIZE;
  const ctx = c.getContext('2d');
  const fill = (color) => { ctx.fillStyle = color; ctx.fillRect(0, 0, TEX_SIZE, TEX_SIZE); };

  const randColor = (base, varAmount) => {
    const r = parseInt(base.slice(1,3),16), g = parseInt(base.slice(3,5),16), b = parseInt(base.slice(5,7),16);
    const v = () => Math.floor(Math.random() * varAmount - varAmount/2);
    return `rgb(${Math.max(0,Math.min(255,r+v()))},${Math.max(0,Math.min(255,g+v()))},${Math.max(0,Math.min(255,b+v()))})`;
  };

  if (name === 'grass_top') {
    fill('#5a9e3d');
    for (let i = 0; i < 400; i++) {
      ctx.fillStyle = randColor('#5a9e3d', 50);
      ctx.fillRect(Math.random()*TEX_SIZE, Math.random()*TEX_SIZE, 2+Math.random()*3, 2+Math.random()*3);
    }
  } else if (name === 'grass_side') {
    fill('#7a5a3a');
    for (let i = 0; i < 500; i++) {
      ctx.fillStyle = randColor('#7a5a3a', 40);
      ctx.fillRect(Math.random()*TEX_SIZE, Math.random()*TEX_SIZE, 2+Math.random()*3, 2+Math.random()*3);
    }
    ctx.fillStyle = '#4a8a2d';
    for (let y = 0; y < 18; y++) {
      for (let x = 0; x < TEX_SIZE; x += 2 + Math.floor(Math.random()*4)) {
        if (Math.random() > 0.5) ctx.fillRect(x, y, 1+Math.random()*2, 1+Math.random()*2);
      }
    }
  } else if (name === 'dirt') {
    fill('#7a5a3a');
    for (let i = 0; i < 600; i++) {
      ctx.fillStyle = randColor('#7a5a3a', 50);
      ctx.fillRect(Math.random()*TEX_SIZE, Math.random()*TEX_SIZE, 2+Math.random()*3, 1+Math.random()*3);
    }
  } else if (name === 'stone') {
    fill('#888888');
    for (let i = 0; i < 700; i++) {
      ctx.fillStyle = randColor('#888888', 45);
      ctx.fillRect(Math.random()*TEX_SIZE, Math.random()*TEX_SIZE, 2+Math.random()*4, 2+Math.random()*4);
    }
  } else if (name === 'wood_top') {
    fill('#6b4f2f');
    ctx.strokeStyle = '#523b22'; ctx.lineWidth = 3;
    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      ctx.arc(TEX_SIZE/2, TEX_SIZE/2, 6 + i*8, 0, Math.PI*2);
      ctx.stroke();
    }
  } else if (name === 'wood_side') {
    fill('#6b4f2f');
    ctx.strokeStyle = '#523b22'; ctx.lineWidth = 2;
    for (let y = 4; y < TEX_SIZE; y += 14 + Math.random()*8) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(TEX_SIZE, y); ctx.stroke();
    }
    for (let i = 0; i < 200; i++) {
      ctx.fillStyle = randColor('#6b4f2f', 35);
      ctx.fillRect(Math.random()*TEX_SIZE, Math.random()*TEX_SIZE, 2+Math.random()*3, 8+Math.random()*20);
    }
  } else if (name === 'leaves') {
    fill('rgba(0,0,0,0)');
    for (let i = 0; i < 80; i++) {
      ctx.fillStyle = randColor('#3a7a2a', 45);
      const x = Math.random()*TEX_SIZE, y = Math.random()*TEX_SIZE;
      ctx.beginPath(); ctx.arc(x, y, 8+Math.random()*14, 0, Math.PI*2); ctx.fill();
    }
  } else if (name === 'sand') {
    fill('#d6cf98');
    for (let i = 0; i < 500; i++) {
      ctx.fillStyle = randColor('#d6cf98', 40);
      ctx.fillRect(Math.random()*TEX_SIZE, Math.random()*TEX_SIZE, 2+Math.random()*3, 1+Math.random()*2);
    }
  } else if (name === 'cobblestone') {
    fill('#777777');
    for (let i = 0; i < 40; i++) {
      ctx.fillStyle = randColor('#777777', 50);
      ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
      const w = 12 + Math.random()*18, h = 10 + Math.random()*16;
      const x = Math.random()*(TEX_SIZE-w), y = Math.random()*(TEX_SIZE-h);
      ctx.fillRect(x, y, w, h); ctx.strokeRect(x, y, w, h);
    }
  } else if (name === 'planks') {
    fill('#b8935f');
    ctx.strokeStyle = '#9a7a4d'; ctx.lineWidth = 2;
    for (let y = 4; y < TEX_SIZE; y += 12) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(TEX_SIZE, y); ctx.stroke();
    }
    for (let i = 0; i < 60; i++) {
      ctx.fillStyle = randColor('#b8935f', 30);
      ctx.fillRect(Math.random()*TEX_SIZE, Math.random()*TEX_SIZE, 4+Math.random()*10, 2+Math.random()*3);
    }
  } else if (name === 'glass') {
    fill('rgba(170, 220, 255, 0.35)');
    ctx.strokeStyle = 'rgba(220, 245, 255, 0.7)'; ctx.lineWidth = 4;
    ctx.strokeRect(2, 2, TEX_SIZE-4, TEX_SIZE-4);
    ctx.beginPath(); ctx.moveTo(8, TEX_SIZE-8); ctx.lineTo(TEX_SIZE-8, 8); ctx.stroke();
  } else if (name === 'bedrock') {
    fill('#333333');
    for (let i = 0; i < 300; i++) {
      ctx.fillStyle = randColor('#333333', 50);
      ctx.fillRect(Math.random()*TEX_SIZE, Math.random()*TEX_SIZE, 2+Math.random()*4, 2+Math.random()*4);
    }
  }
  return new THREE.CanvasTexture(c);
}

const textures = {};
TEX_NAMES.forEach(name => textures[name] = createTexture(name));

// 纹理图集
const atlasCanvas = document.createElement('canvas');
atlasCanvas.width = TEX_SIZE * TEX_NAMES.length;
atlasCanvas.height = TEX_SIZE;
const atlasCtx = atlasCanvas.getContext('2d');
TEX_NAMES.forEach((name, i) => atlasCtx.drawImage(textures[name].image, i*TEX_SIZE, 0));
const atlasTexture = new THREE.CanvasTexture(atlasCanvas);
atlasTexture.magFilter = THREE.NearestFilter;
atlasTexture.minFilter = THREE.NearestFilter;
atlasTexture.generateMipmaps = false;

const texIndex = {};
TEX_NAMES.forEach((name, i) => texIndex[name] = i);

function getBlockFaceTexture(block, face) {
  if (!block || block.id === 0) return null;
  const t = block.textures;
  if (t.all) return texIndex[t.all];
  if (face === 'top') return texIndex[t.top || t.all];
  if (face === 'bottom') return texIndex[t.bottom || t.all];
  return texIndex[t.side || t.all];
}

// Three.js 场景
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, RENDER_DISTANCE*CHUNK_SIZE*0.6, RENDER_DISTANCE*CHUNK_SIZE*0.95);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.05, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// 光照
const ambientLight = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambientLight);
const sunLight = new THREE.DirectionalLight(0xffffff, 0.85);
sunLight.position.set(60, 120, 40);
scene.add(sunLight);

// 指针锁定控制
const player = {
  position: new THREE.Vector3(0, CHUNK_HEIGHT + 10, 0),
  velocity: new THREE.Vector3(0, 0, 0),
  onGround: false,
  yaw: 0, pitch: 0,
  keys: {}
};

let isPointerLocked = false;
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

startBtn.addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  isPointerLocked = document.pointerLockElement === renderer.domElement;
  overlay.style.display = isPointerLocked ? 'none' : 'flex';
});
document.addEventListener('mousemove', (e) => {
  if (!isPointerLocked) return;
  player.yaw -= e.movementX * 0.002;
  player.pitch -= e.movementY * 0.002;
  player.pitch = Math.max(-Math.PI/2 + 0.01, Math.min(Math.PI/2 - 0.01, player.pitch));
});
document.addEventListener('keydown', (e) => {
  player.keys[e.code] = true;
  if (e.code.startsWith('Digit')) {
    const n = parseInt(e.code.replace('Digit',''));
    if (n >= 1 && n <= 9) selectSlot(n-1);
  }
  if (e.code === 'Space' && player.onGround) {
    player.velocity.y = JUMP_SPEED;
    player.onGround = false;
  }
});
document.addEventListener('keyup', (e) => player.keys[e.code] = false);

// 鼠标交互
let highlightedBlock = null;
let highlightMesh = null;
const highlightGeo = new THREE.BoxGeometry(1.002, 1.002, 1.002);
const highlightMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.5 });
highlightMesh = new THREE.Mesh(highlightGeo, highlightMat);
scene.add(highlightMesh);
highlightMesh.visible = false;

document.addEventListener('mousedown', (e) => {
  if (!isPointerLocked) return;
  if (e.button === 0) breakBlock();
  else if (e.button === 2) placeBlock();
});
document.addEventListener('contextmenu', (e) => e.preventDefault());

// 世界数据
const chunks = {};
function chunkKey(cx, cz) { return cx + ',' + cz; }

function getBlock(x, y, z) {
  if (y < 0 || y >= CHUNK_HEIGHT) return BLOCKS.air;
  const cx = Math.floor(x / CHUNK_SIZE), cz = Math.floor(z / CHUNK_SIZE);
  const chunk = chunks[chunkKey(cx, cz)];
  if (!chunk) return BLOCKS.air;
  const bx = Math.floor(x) - cx * CHUNK_SIZE;
  const by = Math.floor(y);
  const bz = Math.floor(z) - cz * CHUNK_SIZE;
  return BLOCK_BY_ID[chunk.blocks[bx][by][bz]] || BLOCKS.air;
}

function setBlock(x, y, z, block) {
  if (y < 0 || y >= CHUNK_HEIGHT) return false;
  const cx = Math.floor(x / CHUNK_SIZE), cz = Math.floor(z / CHUNK_SIZE);
  const key = chunkKey(cx, cz);
  const chunk = chunks[key];
  if (!chunk) return false;
  const bx = Math.floor(x) - cx * CHUNK_SIZE;
  const by = Math.floor(y);
  const bz = Math.floor(z) - cz * CHUNK_SIZE;
  if (bx < 0 || bx >= CHUNK_SIZE || bz < 0 || bz >= CHUNK_SIZE) return false;
  chunk.blocks[bx][by][bz] = block.id;
  chunk.dirty = true;
  // 标记相邻区块（如果位于边界）
  if (bx === 0) markChunkDirty(cx-1, cz);
  if (bx === CHUNK_SIZE-1) markChunkDirty(cx+1, cz);
  if (bz === 0) markChunkDirty(cx, cz-1);
  if (bz === CHUNK_SIZE-1) markChunkDirty(cx, cz+1);
  return true;
}

function markChunkDirty(cx, cz) {
  const chunk = chunks[chunkKey(cx, cz)];
  if (chunk) chunk.dirty = true;
}

function generateChunk(cx, cz) {
  const blocks = new Int8Array(CHUNK_SIZE * CHUNK_HEIGHT * CHUNK_SIZE);
  const get = (x,y,z) => blocks[(x*CHUNK_HEIGHT + y)*CHUNK_SIZE + z];
  const set = (x,y,z,v) => { blocks[(x*CHUNK_HEIGHT + y)*CHUNK_SIZE + z] = v; };

  const worldX0 = cx * CHUNK_SIZE;
  const worldZ0 = cz * CHUNK_SIZE;

  for (let x = 0; x < CHUNK_SIZE; x++) {
    for (let z = 0; z < CHUNK_SIZE; z++) {
      const wx = worldX0 + x, wz = worldZ0 + z;
      const continental = fbm(wx * 0.002, wz * 0.002, 4);
      const detail = fbm(wx * 0.02, wz * 0.02, 3);
      let height = 32 + continental * 24 + detail * 4;
      height = Math.floor(height);
      if (height < 2) height = 2;

      for (let y = 0; y < CHUNK_HEIGHT; y++) {
        if (y === 0) { set(x,y,z, BLOCKS.bedrock.id); }
        else if (y < height - 4) { set(x,y,z, BLOCKS.stone.id); }
        else if (y < height - 1) { set(x,y,z, BLOCKS.dirt.id); }
        else if (y < height) {
          // 生物群系：高海拔或噪声值决定沙子或草
          const sandiness = fbm(wx * 0.01 + 100, wz * 0.01 + 100, 2);
          if (height < 30 && sandiness > 0.55) set(x,y,z, BLOCKS.sand.id);
          else set(x,y,z, BLOCKS.grass.id);
        } else if (y < height + 1 && height > 34) {
          // 少量地表石头
          if (Math.random() < 0.02) set(x,y-1,z, BLOCKS.stone.id);
        }
      }

      // 洞穴/地表凹陷
      if (detail < -0.55 && height > 36) {
        for (let dy = 0; dy < 2 + Math.random()*2; dy++) {
          if (height - dy > 1) set(x, height-dy, z, BLOCKS.air.id);
        }
      }

      // 树木
      if (x > 2 && x < CHUNK_SIZE-3 && z > 2 && z < CHUNK_SIZE-3) {
        const treeNoise = hash(wx * 7.13, wz * 8.91);
        if (treeNoise > 0.965 && get(x, height, z) === BLOCKS.grass.id) {
          const trunkH = 4 + Math.floor(Math.random()*3);
          for (let dy = 1; dy <= trunkH; dy++) set(x, height+dy, z, BLOCKS.wood.id);
          for (let lx = -2; lx <= 2; lx++) {
            for (let lz = -2; lz <= 2; lz++) {
              for (let ly = 0; ly < 2; ly++) {
                const dist = Math.abs(lx) + Math.abs(lz) + ly;
                if (dist < 3 || (dist === 3 && Math.random() > 0.4)) {
                  const nx = x + lx, ny = height + trunkH - 1 + ly, nz = z + lz;
                  if (nx >=0 && nx < CHUNK_SIZE && nz >=0 && nz < CHUNK_SIZE && ny < CHUNK_HEIGHT) {
                    if (get(nx, ny, nz) === BLOCKS.air.id) set(nx, ny, nz, BLOCKS.leaves.id);
                  }
                }
              }
            }
          }
        }
      }
    }
  }

  // 转换 blocks 到三维数组格式便于访问
  const arr3d = [];
  for (let x = 0; x < CHUNK_SIZE; x++) {
    arr3d[x] = [];
    for (let y = 0; y < CHUNK_HEIGHT; y++) {
      arr3d[x][y] = [];
      for (let z = 0; z < CHUNK_SIZE; z++) {
        arr3d[x][y][z] = get(x,y,z);
      }
    }
  }

  return { cx, cz, blocks: arr3d, dirty: true, mesh: null };
}

// 构建区块网格
function buildChunkMesh(chunk) {
  if (chunk.mesh) { scene.remove(chunk.mesh); chunk.mesh.geometry.dispose(); }

  const positions = [];
  const normals = [];
  const uvs = [];
  const colors = [];
  const indices = [];
  let indexOffset = 0;

  const addFace = (x, y, z, dir, texIdx, light) => {
    const x0 = x, y0 = y, z0 = z;
    const u0 = texIdx / TEX_NAMES.length;
    const u1 = (texIdx + 1) / TEX_NAMES.length;
    const v0 = 0, v1 = 1;
    let v = [];

    if (dir === 'py') {
      v = [[x0, y0+1, z0], [x0+1, y0+1, z0], [x0+1, y0+1, z0+1], [x0, y0+1, z0+1]];
      for (let i = 0; i < 4; i++) normals.push(0,1,0);
      uvs.push(u0,v1, u1,v1, u1,v0, u0,v0);
    } else if (dir === 'ny') {
      v = [[x0, y0, z0+1], [x0+1, y0, z0+1], [x0+1, y0, z0], [x0, y0, z0]];
      for (let i = 0; i < 4; i++) normals.push(0,-1,0);
      uvs.push(u0,v1, u1,v1, u1,v0, u0,v0);
    } else if (dir === 'px') {
      v = [[x0+1, y0, z0], [x0+1, y0, z0+1], [x0+1, y0+1, z0+1], [x0+1, y0+1, z0]];
      for (let i = 0; i < 4; i++) normals.push(1,0,0);
      uvs.push(u0,v1, u1,v1, u1,v0, u0,v0);
    } else if (dir === 'nx') {
      v = [[x0, y0, z0+1], [x0, y0, z0], [x0, y0+1, z0], [x0, y0+1, z0+1]];
      for (let i = 0; i < 4; i++) normals.push(-1,0,0);
      uvs.push(u0,v1, u1,v1, u1,v0, u0,v0);
    } else if (dir === 'pz') {
      v = [[x0, y0, z0+1], [x0+1, y0, z0+1], [x0+1, y0+1, z0+1], [x0, y0+1, z0+1]];
      for (let i = 0; i < 4; i++) normals.push(0,0,1);
      uvs.push(u0,v1, u1,v1, u1,v0, u0,v0);
    } else if (dir === 'nz') {
      v = [[x0+1, y0, z0], [x0, y0, z0], [x0, y0+1, z0], [x0+1, y0+1, z0]];
      for (let i = 0; i < 4; i++) normals.push(0,0,-1);
      uvs.push(u0,v1, u1,v1, u1,v0, u0,v0);
    }

    for (let i = 0; i < 4; i++) {
      positions.push(v[i][0], v[i][1], v[i][2]);
      colors.push(light[0], light[1], light[2]);
    }
    indices.push(indexOffset, indexOffset+1, indexOffset+2, indexOffset, indexOffset+2, indexOffset+3);
    indexOffset += 4;
  };

  const worldX0 = chunk.cx * CHUNK_SIZE;
  const worldZ0 = chunk.cz * CHUNK_SIZE;

  for (let x = 0; x < CHUNK_SIZE; x++) {
    for (let y = 0; y < CHUNK_HEIGHT; y++) {
      for (let z = 0; z < CHUNK_SIZE; z++) {
        const bid = chunk.blocks[x][y][z];
        if (bid === 0) continue;
        const block = BLOCK_BY_ID[bid];
        const wx = worldX0 + x, wy = y, wz = worldZ0 + z;

        const lightTop = [1.0, 1.0, 1.0];
        const lightSide = [0.82, 0.82, 0.82];
        const lightBottom = [0.55, 0.55, 0.55];

        // +y top
        const up = getBlock(wx, wy+1, wz);
        if (!up.solid || (up.transparent && !block.transparent)) {
          addFace(x, y, z, 'py', getBlockFaceTexture(block, 'top'), lightTop);
        }
        // -y bottom
        const down = getBlock(wx, wy-1, wz);
        if (!down.solid || (down.transparent && !block.transparent)) {
          addFace(x, y, z, 'ny', getBlockFaceTexture(block, 'bottom'), lightBottom);
        }
        // +x
        const right = getBlock(wx+1, wy, wz);
        if (!right.solid || (right.transparent && !block.transparent)) {
          addFace(x, y, z, 'px', getBlockFaceTexture(block, 'side'), lightSide);
        }
        // -x
        const left = getBlock(wx-1, wy, wz);
        if (!left.solid || (left.transparent && !block.transparent)) {
          addFace(x, y, z, 'nx', getBlockFaceTexture(block, 'side'), lightSide);
        }
        // +z
        const front = getBlock(wx, wy, wz+1);
        if (!front.solid || (front.transparent && !block.transparent)) {
          addFace(x, y, z, 'pz', getBlockFaceTexture(block, 'side'), lightSide);
        }
        // -z
        const back = getBlock(wx, wy, wz-1);
        if (!back.solid || (back.transparent && !block.transparent)) {
          addFace(x, y, z, 'nz', getBlockFaceTexture(block, 'side'), lightSide);
        }
      }
    }
  }

  if (positions.length === 0) { chunk.mesh = null; return; }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  geo.setIndex(indices);
  geo.computeBoundingSphere();

  const mat = new THREE.MeshLambertMaterial({
    map: atlasTexture, vertexColors: true,
    alphaTest: 0.45, transparent: false, side: THREE.FrontSide
  });

  chunk.mesh = new THREE.Mesh(geo, mat);
  chunk.mesh.position.set(worldX0, 0, worldZ0);
  scene.add(chunk.mesh);
  chunk.dirty = false;
}

// 区块管理
function updateChunks() {
  const pcx = Math.floor(player.position.x / CHUNK_SIZE);
  const pcz = Math.floor(player.position.z / CHUNK_SIZE);

  // 生成/加载
  for (let dx = -RENDER_DISTANCE; dx <= RENDER_DISTANCE; dx++) {
    for (let dz = -RENDER_DISTANCE; dz <= RENDER_DISTANCE; dz++) {
      const cx = pcx + dx, cz = pcz + dz;
      const key = chunkKey(cx, cz);
      if (!chunks[key]) {
        chunks[key] = generateChunk(cx, cz);
      }
    }
  }

  // 构建脏区块
  for (const key in chunks) {
    const chunk = chunks[key];
    if (chunk.dirty) buildChunkMesh(chunk);
  }

  // 卸载远处区块
  for (const key in chunks) {
    const chunk = chunks[key];
    if (Math.abs(chunk.cx - pcx) > RENDER_DISTANCE + 1 || Math.abs(chunk.cz - pcz) > RENDER_DISTANCE + 1) {
      if (chunk.mesh) { scene.remove(chunk.mesh); chunk.mesh.geometry.dispose(); }
      delete chunks[key];
    }
  }
}

// 物理与移动
function getAABBBlocks(minX, minY, minZ, maxX, maxY, maxZ) {
  const list = [];
  for (let x = Math.floor(minX); x <= Math.floor(maxX); x++) {
    for (let y = Math.floor(minY); y <= Math.floor(maxY); y++) {
      for (let z = Math.floor(minZ); z <= Math.floor(maxZ); z++) {
        const b = getBlock(x, y, z);
        if (b.solid) list.push({x,y,z});
      }
    }
  }
  return list;
}

function intersectAABB(px, py, pz, sx, sy, sz, bx, by, bz) {
  const minX = bx - sx/2, maxX = bx + 1 + sx/2;
  const minY = by - sy, maxY = by + 1;
  const minZ = bz - sz/2, maxZ = bz + 1 + sz/2;
  return px > minX && px < maxX && py > minY && py < maxY && pz > minZ && pz < maxZ;
}

function resolveCollision(dt) {
  const halfW = PLAYER_WIDTH / 2;
  const h = PLAYER_HEIGHT;

  // Y 轴
  player.position.y += player.velocity.y * dt;
  let minY = player.position.y - h;
  let maxY = player.position.y;
  let blocks = getAABBBlocks(player.position.x - halfW, minY, player.position.z - halfW,
                             player.position.x + halfW, maxY, player.position.z + halfW);
  player.onGround = false;
  for (const b of blocks) {
    if (player.velocity.y < 0 && player.position.y - h >= b.y + 1 - 0.01) {
      player.position.y = b.y + 1 + h;
      player.velocity.y = 0;
      player.onGround = true;
    } else if (player.velocity.y > 0 && player.position.y <= b.y + 0.01) {
      player.position.y = b.y;
      player.velocity.y = 0;
    }
  }

  // X 轴
  player.position.x += player.velocity.x * dt;
  minY = player.position.y - h; maxY = player.position.y;
  blocks = getAABBBlocks(player.position.x - halfW, minY, player.position.z - halfW,
                         player.position.x + halfW, maxY, player.position.z + halfW);
  for (const b of blocks) {
    if (player.velocity.x > 0) player.position.x = b.x - halfW - 0.001;
    else if (player.velocity.x < 0) player.position.x = b.x + 1 + halfW + 0.001;
    player.velocity.x = 0;
  }

  // Z 轴
  player.position.z += player.velocity.z * dt;
  minY = player.position.y - h; maxY = player.position.y;
  blocks = getAABBBlocks(player.position.x - halfW, minY, player.position.z - halfW,
                         player.position.x + halfW, maxY, player.position.z + halfW);
  for (const b of blocks) {
    if (player.velocity.z > 0) player.position.z = b.z - halfW - 0.001;
    else if (player.velocity.z < 0) player.position.z = b.z + 1 + halfW + 0.001;
    player.velocity.z = 0;
  }
}

function updatePlayer(dt) {
  if (!isPointerLocked) return;

  const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);
  const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);
  forward.y = 0; forward.normalize();
  right.y = 0; right.normalize();

  const speed = player.keys['ShiftLeft'] ? RUN_SPEED : WALK_SPEED;
  const move = new THREE.Vector3();
  if (player.keys['KeyW']) move.add(forward);
  if (player.keys['KeyS']) move.sub(forward);
  if (player.keys['KeyA']) move.sub(right);
  if (player.keys['KeyD']) move.add(right);
  if (move.length() > 0) move.normalize().multiplyScalar(speed);

  player.velocity.x = move.x;
  player.velocity.z = move.z;
  player.velocity.y += GRAVITY * dt;

  resolveCollision(dt);

  // 防止掉落虚空
  if (player.position.y < -20) {
    player.position.set(0, CHUNK_HEIGHT + 10, 0);
    player.velocity.set(0,0,0);
  }

  // 相机方向
  camera.position.copy(player.position);
  camera.position.y -= PLAYER_HEIGHT * 0.3; // 眼睛位置
  camera.rotation.order = 'YXZ';
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;
}

// 射线检测
const raycaster = new THREE.Raycaster();
const center = new THREE.Vector2(0, 0);
const intersectable = [];

function getTargetBlock() {
  intersectable.length = 0;
  for (const key in chunks) {
    const chunk = chunks[key];
    if (chunk.mesh) intersectable.push(chunk.mesh);
  }
  raycaster.setFromCamera(center, camera);
  const hits = raycaster.intersectObjects(intersectable, false);
  if (hits.length === 0) return null;
  const hit = hits[0];
  if (hit.distance > REACH) return null;

  const n = hit.face.normal;
  const p = hit.point.clone();
  // 命中方块
  const bx = Math.floor(p.x - n.x * 0.001);
  const by = Math.floor(p.y - n.y * 0.001);
  const bz = Math.floor(p.z - n.z * 0.001);
  // 相邻放置位置
  const px = bx + Math.round(n.x);
  const py = by + Math.round(n.y);
  const pz = bz + Math.round(n.z);

  return { block: {x: bx, y: by, z: bz}, place: {x: px, y: py, z: pz}, normal: n };
}

function updateHighlight() {
  const t = getTargetBlock();
  if (t) {
    highlightedBlock = t.block;
    highlightMesh.visible = true;
    highlightMesh.position.set(t.block.x + 0.5, t.block.y + 0.5, t.block.z + 0.5);
  } else {
    highlightedBlock = null;
    highlightMesh.visible = false;
  }
}

function breakBlock() {
  const t = getTargetBlock();
  if (!t) return;
  setBlock(t.block.x, t.block.y, t.block.z, BLOCKS.air);
}

function placeBlock() {
  const t = getTargetBlock();
  if (!t) return;
  const b = HOTBAR[selectedSlot];
  if (!b) return;
  // 避免与玩家碰撞
  const px = t.place.x, py = t.place.y, pz = t.place.z;
  const halfW = PLAYER_WIDTH/2 + 0.05;
  const minX = player.position.x - halfW, maxX = player.position.x + halfW;
  const minY = player.position.y - PLAYER_HEIGHT - 0.05, maxY = player.position.y + 0.05;
  const minZ = player.position.z - halfW, maxZ = player.position.z + halfW;
  if (px + 1 > minX && px < maxX && py + 1 > minY && py < maxY && pz + 1 > minZ && pz < maxZ) return;
  setBlock(px, py, pz, b);
}

// UI
function initHotbar() {
  const bar = document.getElementById('hotbar');
  bar.innerHTML = '';
  HOTBAR.forEach((block, i) => {
    const slot = document.createElement('div');
    slot.className = 'slot' + (i === selectedSlot ? ' active' : '');
    slot.innerHTML = `<span class="key">${i+1}</span>`;
    const cvs = document.createElement('canvas');
    cvs.width = cvs.height = 64;
    const ctx = cvs.getContext('2d');
    ctx.fillStyle = block.color; ctx.fillRect(0,0,64,64);
    // 简单绘制方块纹理
    const tex = textures[block.textures.all || block.textures.side || block.textures.top];
    if (tex) ctx.drawImage(tex.image, 0, 0, 64, 64);
    slot.appendChild(cvs);
    slot.addEventListener('click', () => selectSlot(i));
    bar.appendChild(slot);
  });
  updateBlockName();
}

function selectSlot(i) {
  selectedSlot = i;
  const slots = document.querySelectorAll('.slot');
  slots.forEach((s, idx) => s.classList.toggle('active', idx === i));
  updateBlockName();
}

function updateBlockName() {
  document.getElementById('blockName').textContent = HOTBAR[selectedSlot].name;
}

// 时间/昼夜
let timeOfDay = 0.25; // 0-1
function updateDayNight(dt) {
  timeOfDay += dt * 0.02; // 50秒一天
  if (timeOfDay > 1) timeOfDay -= 1;
  const angle = (timeOfDay - 0.25) * Math.PI * 2;
  const sunY = Math.sin(angle);
  const sunX = Math.cos(angle);
  sunLight.position.set(sunX * 100, sunY * 100, 30);
  const brightness = Math.max(0.15, Math.sin(angle));
  sunLight.intensity = brightness * 0.9;
  ambientLight.intensity = 0.3 + brightness * 0.35;

  const skyColor = new THREE.Color().setHSL(0.56, 0.6, 0.45 + brightness * 0.45);
  scene.background = skyColor;
  scene.fog.color = skyColor;
}

// 主循环
let lastTime = performance.now();
let frameCount = 0, fpsTime = 0, fps = 0;
const info = document.getElementById('info');

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;

  updateChunks();
  updatePlayer(dt);
  updateHighlight();
  updateDayNight(dt);

  frameCount++;
  fpsTime += dt;
  if (fpsTime >= 1) {
    fps = frameCount;
    frameCount = 0; fpsTime = 0;
  }

  info.innerHTML = `XYZ: ${player.position.x.toFixed(1)} / ${player.position.y.toFixed(1)} / ${player.position.z.toFixed(1)}<br>FPS: ${fps}<br>区块: ${Object.keys(chunks).length}`;

  renderer.render(scene, camera);
}

// 窗口调整
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// 启动
initHotbar();
updateChunks();
// 找一个安全出生点
setTimeout(() => {
  let spawnFound = false;
  for (let x = -2; x <= 2 && !spawnFound; x++) {
    for (let z = -2; z <= 2 && !spawnFound; z++) {
      for (let y = CHUNK_HEIGHT - 1; y > 0; y--) {
        const b = getBlock(x, y, z);
        if (b.solid) {
          player.position.set(x + 0.5, y + 1 + PLAYER_HEIGHT, z + 0.5);
          spawnFound = true;
          break;
        }
      }
    }
  }
}, 100);

animate();
</script>
